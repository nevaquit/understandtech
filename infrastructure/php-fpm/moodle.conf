; Moodle PHP-FPM pool — understandtech.app
; Deploy to /etc/php/8.3/fpm/pool.d/moodle.conf

[moodle]
user = www-data
group = www-data

; Force worker CWD before Moodle bootstrap (prevents intermittent chdir Permission denied).
chdir = /var/www/moodle

listen = /run/php/moodle.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 15
pm.max_requests = 500

; Moodle benefits from longer execution for backups/imports (matches nginx/php.ini).
request_terminate_timeout = 300

catch_workers_output = yes
clear_env = no

; Environment injected at deploy time from Key Vault / /etc/moodle/env (never in git).
env[MOODLE_DATAROOT] = /var/www/moodledata

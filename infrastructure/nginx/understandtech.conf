# understandtech.app — Marketing site at root, Moodle at /learn
# Deploy to /etc/nginx/sites-available/understandtech.conf
# Include rate-limit zone from http context: understandtech-rate-limit.conf

upstream moodle_php {
    server unix:/run/php/moodle.sock;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name understandtech.app www.understandtech.app;

    # Cloudflare Origin Certificate (install on first boot).
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # Authenticated Origin Pulls — only Cloudflare may reach this origin.
    ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ─── Marketing website root ───────────────────────────────────────
    root /var/www/marketing;
    index index.html;

    access_log /var/log/nginx/understandtech_access.log combined;
    error_log  /var/log/nginx/understandtech_error.log notice;

    client_max_body_size 200M;

    gzip on;
    gzip_types text/css text/javascript application/javascript application/json text/plain;

    # ─── Static marketing site assets ────────────────────────────────
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        root /var/www/marketing;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Marketing pages (root) ───────────────────────────────────────
    location / {
        root /var/www/marketing;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ─── Moodle at /learn ─────────────────────────────────────────────
    # All /learn/* requests are served from /var/www/moodle with the
    # path rewritten (strip the /learn prefix) so Moodle sees its own URLs.
    location ^~ /learn {
        alias /var/www/moodle;
        index index.php;

        # Moodle revisioned JS/CSS via PHP — PATH_INFO slash arguments.
        location ~ ^/learn/lib/javascript\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/lib/javascript.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        location ~ ^/learn/lib/requirejs\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/lib/requirejs.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        location ~ ^/learn/theme/yui_combo\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/theme/yui_combo.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Moodle theme CSS — PATH_INFO slash arguments.
        location ~ ^/learn/theme/styles\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/theme/styles.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Moodle theme images — PATH_INFO slash arguments.
        location ~ ^/learn/theme/image\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/theme/image.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Moodle pluginfile and webservice/pluginfile — PATH_INFO slash arguments.
        location ~ ^/learn/(pluginfile|webservice/pluginfile)\.php(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Moodle login rate limit.
        location = /learn/login/index.php {
            limit_req zone=moodle_login burst=2 nodelay;
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/login/index.php;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Deny sensitive Moodle paths.
        location ~ ^/learn/(config\.php|install\.php|admin/cli/|backup/) {
            deny all;
            return 404;
        }

        # Generic PHP handler for Moodle.
        location ~ ^/learn/(.+\.php)(/|$) {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME /var/www/moodle/$1;
            fastcgi_pass moodle_php;
            fastcgi_buffers 64 4k;
            fastcgi_buffering on;
        }

        # Static Moodle assets.
        location ~ ^/learn/(.+)$ {
            try_files /var/www/moodle/$1 =404;
        }
    }

    # ─── Legacy redirect: / → /learn for old bookmarks ───────────────
    # Users who bookmarked /my/ or /login/ get redirected to /learn equivalent.
    location ~ ^/(my|login|course|mod|user|admin|blocks|lib|theme|pluginfile|webservice)(/|$) {
        return 301 /learn$request_uri;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(bak|old)$ {
        deny all;
    }

    error_page 502 503 504 /error/error.html;
}

# moodledata MUST live outside document root (/var/www/moodledata).
# No location block serves /var/www/moodledata from this vhost.

server {
    listen 80;
    listen [::]:80;
    server_name understandtech.app www.understandtech.app;
    return 301 https://$host$request_uri;
}

# understandtech.app — Marketing site at root, Moodle at /learn
# Deploy to /etc/nginx/sites-available/understandtech.conf
# Include rate-limit zone from http context: understandtech-rate-limit.conf

upstream moodle_php {
    server unix:/run/php/moodle.sock;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name understandtech.app www.understandtech.app;

    # Cloudflare Origin Certificate (install on first boot).
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # Authenticated Origin Pulls — only Cloudflare may reach this origin.
    ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ─── Marketing website root ───────────────────────────────────────
    root /var/www/marketing;
    index index.html;

    access_log /var/log/nginx/understandtech_access.log combined;
    error_log  /var/log/nginx/understandtech_error.log notice;

    client_max_body_size 200M;

    gzip on;
    gzip_types text/css text/javascript application/javascript application/json text/plain;

    # ─── Static marketing site assets ────────────────────────────────
    location ~* ^(?!/learn/).*\.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        root /var/www/marketing;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Marketing pages (root) ───────────────────────────────────────
    location / {
        root /var/www/marketing;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ─── Deny sensitive Moodle paths ─────────────────────────────────
    location ~ ^/learn/(config\.php|install\.php|admin/cli/|backup/) {
        deny all;
        return 404;
    }

    # ─── Moodle login with rate limiting ─────────────────────────────
    # IMPORTANT: include fastcgi_params FIRST, then override SCRIPT_NAME.
    # nginx applies fastcgi_param directives in order; the last value wins.
    # fastcgi_split_path_info strips /learn from $fastcgi_script_name, so
    # we must override SCRIPT_NAME after the include to restore the prefix.
    location = /learn/login/index.php {
        limit_req zone=moodle_login burst=10 nodelay;
        fastcgi_split_path_info ^/learn(/.+\.php)(/?.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/moodle/login/index.php;
        fastcgi_param SCRIPT_NAME     /learn/login/index.php;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # ─── Moodle special PHP files with PATH_INFO ─────────────────────
    location ~ ^/learn/(lib/javascript|lib/requirejs|theme/yui_combo|theme/styles|theme/image|pluginfile|webservice/pluginfile)\.php(/|$) {
        fastcgi_split_path_info ^/learn(/.+\.php)(/?.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/moodle$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME     /learn$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # ─── Moodle generic PHP handler ──────────────────────────────────
    location ~ ^/learn/.+\.php(/|$) {
        fastcgi_split_path_info ^/learn(/.+\.php)(/?.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/moodle$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME     /learn$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # ─── Moodle at /learn — directory and static assets ──────────────
    # This block handles all /learn/* requests:
    # - Static files (js, css, images) are served directly from /var/www/moodle
    # - Directory-style URLs (/learn/my/, /learn/course/view.php) fall through
    #   to /var/www/moodle/index.php via the @moodle_index named location
    location /learn {
        alias /var/www/moodle;
        index index.php;
        try_files $uri $uri/ @moodle_index;
    }

    # ─── Named location: route directory-style Moodle URLs to index.php ─
    location @moodle_index {
        rewrite ^/learn(/.*)?$ /learn/index.php?$query_string last;
    }

    # ─── Legacy redirect: bare Moodle paths → /learn ─────────────────
    location ~ ^/(my|login|course|mod|user|admin|blocks|lib|theme|pluginfile|webservice)(/|$) {
        return 301 /learn$request_uri;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(bak|old)$ {
        deny all;
    }

    error_page 502 503 504 /error/error.html;
}

# moodledata MUST live outside document root (/var/www/moodledata).
# No location block serves /var/www/moodledata from this vhost.

server {
    listen 80;
    listen [::]:80;
    server_name understandtech.app www.understandtech.app;
    return 301 https://$host$request_uri;
}

# understandtech.app — Moodle origin (Nginx 1.26)
# Deploy to /etc/nginx/sites-available/understandtech.conf
# Include rate-limit zone from http context: understandtech-rate-limit.conf

upstream moodle_php {
    server unix:/run/php/moodle.sock;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name understandtech.app www.understandtech.app;

    # Cloudflare Origin Certificate (install on first boot).
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # Authenticated Origin Pulls — only Cloudflare may reach this origin.
    ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/moodle;
    index index.php;

    access_log /var/log/nginx/understandtech_access.log combined;
    error_log  /var/log/nginx/understandtech_error.log notice;

    client_max_body_size 200M;

    gzip on;
    gzip_types text/css text/javascript application/javascript application/json text/plain;

    # Moodle revisioned JS/CSS via PHP — must not hit the static .js/.css handler below.
    location ~ ^/lib/javascript\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    location ~ ^/lib/requirejs\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    location ~ ^/theme/yui_combo\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # Moodle theme CSS — uses PATH_INFO slash arguments, MUST be before the static asset rule.
    location ~ ^/theme/styles\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # Moodle theme image serving — also uses slash arguments.
    location ~ ^/theme/image\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # Moodle pluginfile and webservice/pluginfile — slash arguments.
    location ~ ^/(pluginfile|webservice/pluginfile)\.php(/|$) {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # Static assets — long cache (Cloudflare CDN handles edge caching too).
    # Excludes Moodle PHP-served revisioned URLs handled above.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Moodle login rate limit (zone defined in http context).
    location = /login/index.php {
        limit_req zone=moodle_login burst=2 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass moodle_php;
        fastcgi_buffers 64 4k;
        fastcgi_buffering on;
    }

    # Deny sensitive Moodle paths.
    location ~ ^/(config\.php|install\.php|admin/cli/|backup/) {
        deny all;
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(bak|old)$ {
        deny all;
    }

    error_page 502 503 504 /error/error.html;
}

# moodledata MUST live outside document root (/var/www/moodledata).
# No location block serves /var/www/moodledata from this vhost.

server {
    listen 80;
    listen [::]:80;
    server_name understandtech.app www.understandtech.app;
    return 301 https://$host$request_uri;
}

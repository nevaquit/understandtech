# Rate limiting zones — include from http {} context in nginx.conf:
#   include /etc/nginx/conf.d/understandtech-rate-limit.conf;

# 30 requests/minute per IP on Moodle login page (GET + POST).
# Burst of 10 allows normal page loads without triggering the limiter.
# This protects against brute-force while allowing legitimate users.
limit_req_zone $binary_remote_addr zone=moodle_login:10m rate=30r/m;

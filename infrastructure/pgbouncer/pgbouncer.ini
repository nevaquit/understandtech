; PgBouncer configuration for understandtech.app Moodle origin
; Deploy to /etc/pgbouncer/pgbouncer.ini
; Reload without dropping connections: pgbouncer -R -d /etc/pgbouncer/pgbouncer.ini

[databases]
; Transaction pool mode is REQUIRED for PHP-FPM short-lived connections.
moodle = host={{POSTGRES_FQDN}} port=5432 dbname=moodle pool_mode=transaction

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction mode multiplexes many PHP-FPM workers onto fewer Postgres backends.
pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 5
server_idle_timeout = 600
server_lifetime = 3600
query_wait_timeout = 30
application_name_add_host = 1
ignore_startup_parameters = extra_float_digits

; High volume — rely on Azure Postgres diagnostic logs for connection auditing.
log_connections = 0
log_disconnections = 0

admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; Reload: pgbouncer -R -d /etc/pgbouncer/pgbouncer.ini

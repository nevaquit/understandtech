<div class="ut-lesson-diagram ut-infographic">

<polygon points="210,30 390,310 30,310" fill="url(#ciaTriadFill)" stroke="#C9A227" stroke-width="2.5"/>
<line x1="210" y1="30" x2="210" y2="310" stroke="#1A8A7D" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>

<circle cx="210" cy="72" r="46" fill="#0B1F3A" stroke="#C9A227" stroke-width="2"/>
<text x="210" y="68" text-anchor="middle" fill="#C9A227" font-size="13" font-weight="700">C</text>
<text x="210" y="86" text-anchor="middle" fill="#f8fafc" font-size="11">Confidentiality</text>
</g>
<g class="cia-node cia-node--i">
<circle cx="95" cy="280" r="46" fill="#0B1F3A" stroke="#C9A227" stroke-width="2"/>

<text x="95" y="294" text-anchor="middle" fill="#f8fafc" font-size="11">Integrity</text>

<div class="cia-triad">
<div class="cia-element">
<h4>🔒 Confidentiality</h4>
<p>Information accessible only to authorized parties</p>
</div>
<div class="cia-element">
<h4>✅ Integrity</h4>
<p>Data accuracy, completeness, and trustworthiness</p>
</div>
<div class="cia-element">
<h4>🌐 Availability</h4>
<p>Systems and data accessible when needed</p>
</div>
</div>

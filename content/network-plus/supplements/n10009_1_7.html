<h4>Exam focus</h4>
<p>Given a scenario, use appropriate IPv4 network addressing</p>
<ul>
<li>Usable hosts = 2^host_bits − 2 for standard subnets.</li>
<li>APIPA 169.254.x.x indicates DHCP failure.</li>
<li>Private ranges: 10/8, 172.16–31/12, 192.168/16.</li>
<li>VLSM allows different mask lengths within one routing domain.</li>
</ul>

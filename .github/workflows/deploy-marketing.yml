# Marketing site deployment
# Syncs the marketing/ folder to /var/www/marketing/ on the production VM
# whenever files under marketing/ change on the main branch.

name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'marketing/**'
  workflow_dispatch: {}

concurrency:
  group: marketing-deploy
  cancel-in-progress: true

env:
  PLUGINS_REPO_DIR: /opt/understandtech-plugins
  RSYNC_BIN: /usr/bin/rsync

jobs:
  deploy:
    name: Deploy Marketing Site
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo on VM
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd ${PLUGINS_REPO_DIR}
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            actual="$(git rev-parse HEAD)"
            if [ "$actual" = "$EXPECTED_SHA" ]; then
              echo "Monorepo synced to ${EXPECTED_SHA}"
              exit 0
            fi
            echo "origin/main is ${actual}, expected ${EXPECTED_SHA} (attempt ${attempt}/5)"
            sleep 3
          done
          echo "ERROR: monorepo stuck at $(git rev-parse HEAD), expected ${EXPECTED_SHA}" >&2
          exit 1

      - name: Deploy marketing site
        run: |
          set -euo pipefail
          sudo ${RSYNC_BIN} -av --delete \
            --exclude='.git' --exclude='.github' \
            ${PLUGINS_REPO_DIR}/marketing/ /var/www/marketing/
          sudo /usr/bin/chown -R gha-runner:gha-runner /var/www/marketing/
          echo "Marketing site deployed from commit ${{ github.sha }}"

      - name: Verify deployment
        run: |
          set -euo pipefail
          grep -q 'wantsurl' /var/www/marketing/js/components.js && \
            echo "LOGIN_URL verified: $(grep LOGIN_URL /var/www/marketing/js/components.js)" || \
            echo "WARNING: wantsurl not found in components.js"

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "WARNING: CF_API_TOKEN or CF_ZONE_ID not set — skipping Cloudflare cache purge"
            exit 0
          fi
          echo "Purging Cloudflare cache for marketing assets..."
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://understandtech.app/",
                "https://understandtech.app/css/design-system.css",
                "https://understandtech.app/css/pages.css",
                "https://understandtech.app/js/main.js",
                "https://understandtech.app/js/components.js",
                "https://understandtech.app/pages/gamification.html",
                "https://understandtech.app/pages/ai-tutor.html",
                "https://understandtech.app/pages/certification.html",
                "https://understandtech.app/pages/pricing.html",
                "https://understandtech.app/pages/about.html"
              ]
            }' | python3 -c "
import json, sys
data = json.load(sys.stdin)
if data.get('success'):
    print('Cloudflare cache purged successfully')
else:
    print('Cache purge response:', json.dumps(data, indent=2))
"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Marketing Deploy Summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

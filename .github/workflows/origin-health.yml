# Proactive origin health — authenticated Moodle smoke + auto-recovery.
name: Origin health check

on:
  schedule:
    # Every 3 minutes (was 5) — shorter blind window between deploy and detection.
    - cron: '*/3 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ['Deploy Moodle Plugins']
    types: [completed]
    branches: [main]

env:
  PLUGINS_REPO_DIR: /opt/understandtech-plugins

jobs:
  health:
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo on VM
        run: |
          set -euo pipefail
          cd "$PLUGINS_REPO_DIR"
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main

      - name: Sync gha-runner sudoers
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/sync-sudoers-vm.sh"

      - name: Apply PHP-FPM pool config
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/apply-php-fpm-pool-vm.sh"

      - name: Authenticated web health check (strict)
        id: health
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/verify-moodle-web-health.sh"

      - name: Full origin recovery
        if: steps.health.outcome == 'failure'
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/ensure-origin-healthy-vm.sh"

      - name: Disable maintenance mode
        if: success()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Health summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Origin health"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Authenticated check: ${{ steps.health.outcome }}"
            echo "- Recovery run: ${{ steps.health.outcome == 'failure' && 'yes' || 'no' }}"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

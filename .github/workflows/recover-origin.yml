name: Recover origin DB

on:
  workflow_dispatch:
    inputs:
      fix_page_filters:
        description: Run SEC701 page filter cache fix (cmid 4)
        type: boolean
        default: true

jobs:
  recover:
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main

      - name: Ensure origin healthy
        run: |
          set -euo pipefail
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/ensure-origin-healthy-vm.sh

      - name: Fix page module filters
        if: inputs.fix_page_filters
        run: |
          set -euo pipefail
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/fix-page-filter-cache-vm.sh 4

      - name: Diagnose course index drawer
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/diagnose-course-index-vm.sh 3

      - name: Verify web health
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/origin-web-health-vm.sh

      - name: Verify page module CLI
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/diagnose-page-cmid-vm.sh 4

      - name: Disable maintenance mode
        if: always()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

name: Recover origin DB

on:
  workflow_dispatch:
    inputs:
      fix_page_filters:
        description: Run SEC701 page filter cache fix (cmid 4)
        type: boolean
        default: true

env:
  PLUGINS_REPO_DIR: /opt/understandtech-plugins

jobs:
  recover:
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo
        run: |
          set -euo pipefail
          cd "$PLUGINS_REPO_DIR"
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main

      - name: Ensure origin healthy (DB, PHP-FPM, enrol, theme, strict health)
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/ensure-origin-healthy-vm.sh"

      - name: Fix page module filters
        if: inputs.fix_page_filters
        run: |
          set -euo pipefail
          export SEC701_COURSE_ID=3
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/fix-sec701-course-filters-vm.sh"
          if sudo -u www-data php -r 'define("CLI_SCRIPT",true);require "/var/www/moodle/config.php";global $DB;exit($DB->record_exists("course",["shortname"=>"NET009"])?0:1);' 2>/dev/null; then
            sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/fix-net009-course-filters-vm.sh"
          fi

      - name: Diagnose course index drawer
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/diagnose-course-index-vm.sh" 3

      - name: Verify Moodle web health (strict)
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/verify-moodle-web-health.sh"

      - name: Verify page module CLI
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/diagnose-page-cmid-vm.sh" 4

      - name: Disable maintenance mode
        if: success()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

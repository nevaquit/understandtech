name: Theme upgrade and purge caches

on:
  workflow_dispatch:
    inputs:
      target:
        description: Runner target
        type: choice
        options:
          - production
          - staging
        default: production

env:
  PLUGINS_REPO_DIR: /opt/understandtech-plugins

jobs:
  maintain-production:
    if: inputs.target == 'production'
    name: Theme upgrade (production)
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Sync monorepo on VM
        run: |
          set -euo pipefail
          cd "$PLUGINS_REPO_DIR"
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
      - name: Sync gha-runner sudoers
        run: sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/sync-sudoers-vm.sh"

      - name: Theme upgrade and purge caches
        run: sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/theme-upgrade-purge-vm.sh"
      - name: Verify deployed CSS tokens
        run: |
          set -euo pipefail
          grep -qF '--ut-action' /var/www/moodle/theme/understandtech/style/global-shell.css
          grep -qF 'var(--ut-action)' /var/www/moodle/theme/understandtech/style/global-shell.css
          echo "global_shell_conversion_tokens_ok=1"
          if grep -q 'formatoptions->filter = false' /var/www/moodle/mod/page/view.php; then
            echo "mod_page_filter_patch_ok=1"
          else
            echo "mod_page_filter_patch_missing=1" >&2
            exit 1
          fi
      - name: Disable maintenance mode
        if: success()
        run: sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

  maintain-staging:
    if: inputs.target == 'staging'
    name: Theme upgrade (staging)
    runs-on: [self-hosted, linux, staging]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Sync monorepo on VM
        run: |
          set -euo pipefail
          cd "$PLUGINS_REPO_DIR"
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
      - name: Sync gha-runner sudoers
        run: sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/sync-sudoers-vm.sh"

      - name: Theme upgrade and purge caches
        run: sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/theme-upgrade-purge-vm.sh"
      - name: Verify deployed CSS tokens
        run: |
          set -euo pipefail
          grep -qF '--ut-action' /var/www/moodle/theme/understandtech/style/global-shell.css
          grep -qF 'var(--ut-action)' /var/www/moodle/theme/understandtech/style/global-shell.css
          echo "global_shell_conversion_tokens_ok=1"
          if grep -q 'formatoptions->filter = false' /var/www/moodle/mod/page/view.php; then
            echo "mod_page_filter_patch_ok=1"
          else
            echo "mod_page_filter_patch_missing=1" >&2
            exit 1
          fi
      - name: Disable maintenance mode
        if: success()
        run: sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

# One-off: apply nginx config on production VM (Moodle JS routing fix).

name: Apply nginx config

on:
  workflow_dispatch:

jobs:
  apply:
    name: Apply nginx on VM
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo and apply nginx via upgrade script
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/moodle-upgrade-direct-pg.sh

      - name: Disable maintenance mode
        if: always()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Verify nginx JS routing and login
        run: |
          set -euo pipefail
          grep -q 'javascript\\.php' /etc/nginx/sites-available/understandtech.conf
          echo "nginx: javascript.php location present"
          dbhost="$(sudo -u www-data /usr/bin/php -r 'define("CLI_SCRIPT",true); require "/var/www/moodle/config.php"; echo $CFG->dbhost;' 2>/dev/null || true)"
          dbport="$(sudo -u www-data /usr/bin/php -r 'define("CLI_SCRIPT",true); require "/var/www/moodle/config.php"; echo $CFG->dboptions["dbport"] ?? "";' 2>/dev/null || true)"
          echo "dbhost=${dbhost}"
          echo "dboptions=${dbport}"
          if [[ "$dbhost" != "127.0.0.1" ]]; then
            echo "Expected dbhost 127.0.0.1 (PgBouncer)" >&2
            exit 1
          fi
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            'https://understandtech.app/lib/javascript.php/-1/lib/requirejs/require.min.js' || true)"
          echo "requirejs_http=${code}"
          if [ "$code" != "200" ]; then
            echo "Expected 200 from Cloudflare RequireJS URL" >&2
            exit 1
          fi
          login_code="$(curl -sS -o /tmp/login-check.html -w '%{http_code}' \
            'https://understandtech.app/login/index.php' || true)"
          echo "login_http=${login_code}"
          if grep -q 'Error reading from database' /tmp/login-check.html 2>/dev/null; then
            echo "Login page shows database error" >&2
            exit 1
          fi

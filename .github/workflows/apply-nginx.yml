# One-off: apply nginx config on production VM (Moodle JS routing fix).

name: Apply nginx config

on:
  workflow_dispatch:

jobs:
  apply:
    name: Apply nginx on VM
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo and apply nginx via upgrade script
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
          sudo /usr/bin/bash /opt/understandtech-plugins/scripts/moodle-upgrade-direct-pg.sh

      - name: Disable maintenance mode
        if: always()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Verify tutor JWT and worker
        run: |
          set -euo pipefail
          sudo -u www-data php /opt/understandtech-plugins/scripts/test-tutor-jwt.php --curl

      - name: Verify RequireJS endpoint
        run: |
          set -euo pipefail
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            'https://understandtech.app/lib/javascript.php/-1/lib/requirejs/require.min.js' \
            --resolve understandtech.app:443:127.0.0.1 -k || true)"
          echo "requirejs_http=${code}"
          if [ "$code" != "200" ]; then
            echo "Expected 200 from local RequireJS URL" >&2
            exit 1
          fi

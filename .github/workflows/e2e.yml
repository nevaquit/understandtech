# Playwright E2E against staging (default) or production override.
# Required before production deploy (staging-e2e job in deploy.yml).

name: E2E

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Moodle base URL (default staging /learn)
        type: string
        default: 'https://staging.understandtech.app/learn'
  schedule:
    - cron: '0 6 * * 1'
  workflow_call:
    inputs:
      target_url:
        required: false
        type: string
        default: 'https://staging.understandtech.app/learn'

jobs:
  playwright:
    name: Playwright chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          set -euo pipefail
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E
        working-directory: tests/e2e
        env:
          STAGING_URL: ${{ inputs.target_url || secrets.STAGING_URL }}
          STAGING_TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          STAGING_TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          MOODLE_E2E_USER: ${{ secrets.MOODLE_E2E_USER }}
          MOODLE_E2E_PASS: ${{ secrets.MOODLE_E2E_PASS }}
          E2E_COURSE_PATH: ${{ secrets.E2E_COURSE_PATH }}
          CI: 'true'
        run: |
          set -euo pipefail
          export STAGING_URL="${STAGING_URL:-https://staging.understandtech.app/learn}"
          export STAGING_TEST_USER_EMAIL="${STAGING_TEST_USER_EMAIL:-${MOODLE_E2E_USER:-}}"
          export STAGING_TEST_USER_PASSWORD="${STAGING_TEST_USER_PASSWORD:-${MOODLE_E2E_PASS:-}}"
          export E2E_COURSE_PATH="${E2E_COURSE_PATH:-/course/view.php?id=3}"
          if [ -z "$STAGING_TEST_USER_EMAIL" ] || [ -z "$STAGING_TEST_USER_PASSWORD" ]; then
            echo "STAGING_TEST_USER_* or MOODLE_E2E_USER/MOODLE_E2E_PASS not configured — skipping E2E"
            exit 0
          fi
          npx playwright test --project=chromium --workers=1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

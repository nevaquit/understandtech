# Playwright E2E against staging/production (requires repository secrets).

name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  playwright:
    name: Playwright chromium
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Check credentials
        id: creds
        run: |
          if [ -z "${{ secrets.STAGING_TEST_USER_EMAIL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "STAGING_TEST_USER_EMAIL not configured — skipping E2E"
          fi

      - name: Run E2E
        if: steps.creds.outputs.skip != 'true'
        working-directory: tests/e2e
        env:
          STAGING_URL: ${{ secrets.STAGING_URL || 'https://understandtech.app' }}
          STAGING_TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          STAGING_TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          E2E_COURSE_PATH: ${{ secrets.E2E_COURSE_PATH || '/course/view.php?id=2' }}
          CI: 'true'
        run: npx playwright test --project=chromium --workers=1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

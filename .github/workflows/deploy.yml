# Production plugin deployment — Phase 5.1 (docs/playbook.md)
# Validate on GitHub-hosted runners; deploy on self-hosted production VM.

name: Deploy Moodle Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upgrade:
        description: Skip Moodle upgrade.php
        type: choice
        options: ['false', 'true']
        default: 'false'

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  MOODLE_DIR: /var/www/moodle
  MOODLE_DATAROOT: /var/www/moodledata
  PLUGINS_REPO_DIR: /opt/understandtech-plugins
  PHP_BIN: /usr/bin/php
  RSYNC_BIN: /usr/bin/rsync
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      changed_plugins: ${{ steps.detect.outputs.changed_plugins }}
      has_plugin_changes: ${{ steps.detect.outputs.has_plugin_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, intl, zip
          coverage: none

      - name: PHP syntax lint
        run: |
          set -euo pipefail
          mapfile -t files < <(find moodle-plugins -name '*.php' \
            ! -path '*/vendor/*' ! -path '*/.git/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PHP files under moodle-plugins/"
            exit 0
          fi
          for f in "${files[@]}"; do
            php -l "$f"
          done

      - name: Validate plugin version.php
        run: |
          set -euo pipefail
          while IFS= read -r -d '' versionfile; do
            php -r '
              $f = $argv[1];
              include $f;
              if (empty($plugin->version)) {
                  fwrite(STDERR, "Missing \$plugin->version in {$f}\n");
                  exit(1);
              }
              if (empty($plugin->component)) {
                  fwrite(STDERR, "Missing \$plugin->component in {$f}\n");
                  exit(1);
              }
              echo "OK {$plugin->component} v{$plugin->version}\n";
            ' "$versionfile"
          done < <(find moodle-plugins -name version.php -print0)

      - name: Moodle CodeChecker (warn only)
        continue-on-error: true
        run: |
          set -euo pipefail
          composer global require --no-interaction moodlehq/moodle-cs
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          phpcs --standard=moodle moodle-plugins/ || true

      - name: Validate Bicep
        run: |
          set -euo pipefail
          az config set bicep.use_binary_from_path=false
          az bicep build --file infrastructure/bicep/main.bicep

      - name: AI Gateway typecheck
        run: |
          set -euo pipefail
          cd cloudflare-worker/ai-gateway
          npm ci
          npm run typecheck

      - name: Detect changed plugins
        id: detect
        run: |
          set -euo pipefail

          # Only deploy plugins with version.php; README-only placeholders are skipped.
          is_deployable() {
            [ -f "moodle-plugins/$1/version.php" ]
          }

          detect_all() {
            find moodle-plugins -mindepth 1 -maxdepth 1 -type d -printf '%f\n' \
              | while read -r name; do
                  is_deployable "$name" && echo "$name"
                done | sort
          }

          filter_deployable() {
            while read -r name; do
              [ -n "$name" ] && is_deployable "$name" && echo "$name"
            done | sort -u
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mapfile -t plugins < <(detect_all)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t plugins < <(
              git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD \
                | grep '^moodle-plugins/' | cut -d/ -f2 | filter_deployable
            )
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            mapfile -t plugins < <(
              git diff --name-only HEAD~1 HEAD \
                | grep '^moodle-plugins/' | cut -d/ -f2 | filter_deployable || true
            )
          else
            mapfile -t plugins < <(detect_all)
          fi

          if [ "${#plugins[@]}" -eq 0 ]; then
            echo "changed_plugins="
            echo "has_plugin_changes=false"
            echo "No moodle-plugins changes detected"
            exit 0
          fi

          joined=$(printf '%s ' "${plugins[@]}")
          echo "changed_plugins=${joined}" >> "$GITHUB_OUTPUT"
          echo "has_plugin_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${joined}"

  deploy:
    name: Deploy
    needs: validate
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.validate.outputs.has_plugin_changes == 'true')
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable maintenance mode
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --enable

      - name: Sync monorepo on VM
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main

      - name: Remove placeholder plugin dirs
        run: |
          set -euo pipefail

          plugin_moodle_path() {
            local name="$1"
            case "$name" in
              local_*) echo "local/${name#local_}" ;;
              mod_*) echo "mod/${name#mod_}" ;;
              theme_*) echo "theme/${name#theme_}" ;;
              block_*) echo "blocks/${name#block_}" ;;
              qbehaviour_*) echo "question/behaviour/${name#qbehaviour_}" ;;
              *)
                echo "Unknown plugin prefix: $name" >&2
                return 1
                ;;
            esac
          }

          for srcpath in "${PLUGINS_REPO_DIR}"/moodle-plugins/*/; do
            [ -d "$srcpath" ] || continue
            srcname="$(basename "$srcpath")"
            if [ -f "${srcpath}version.php" ]; then
              continue
            fi
            relpath="$(plugin_moodle_path "$srcname")"
            dst="${MOODLE_DIR}/${relpath}"
            if [ -d "$dst" ]; then
              sudo /usr/bin/rm -rf "$dst"
              echo "Removed placeholder dir (no version.php): $dst"
            fi
          done

      - name: Rsync changed plugins
        env:
          CHANGED_PLUGINS: ${{ needs.validate.outputs.changed_plugins }}
        run: |
          set -euo pipefail

          plugin_moodle_path() {
            local name="$1"
            case "$name" in
              local_*) echo "local/${name#local_}" ;;
              mod_*) echo "mod/${name#mod_}" ;;
              theme_*) echo "theme/${name#theme_}" ;;
              block_*) echo "blocks/${name#block_}" ;;
              qbehaviour_*) echo "question/behaviour/${name#qbehaviour_}" ;;
              *)
                echo "Unknown plugin prefix: $name" >&2
                return 1
                ;;
            esac
          }

          chown_plugin() {
            local relpath="$1"
            case "$relpath" in
              local/*|mod/*|theme/*|blocks/*)
                local type="${relpath%%/*}"
                local name="${relpath#*/}"
                sudo /usr/bin/chown -R www-data:www-data "${MOODLE_DIR}/${type}/${name}"
                ;;
              question/behaviour/*)
                local name="${relpath#question/behaviour/}"
                sudo /usr/bin/chown -R www-data:www-data "${MOODLE_DIR}/question/behaviour/${name}"
                ;;
              *)
                echo "No sudo chown rule for path: $relpath" >&2
                return 1
                ;;
            esac
          }

          read -r -a plugins <<< "$CHANGED_PLUGINS"
          for srcname in "${plugins[@]}"; do
            [ -z "$srcname" ] && continue
            relpath="$(plugin_moodle_path "$srcname")"
            src="${PLUGINS_REPO_DIR}/moodle-plugins/${srcname}/"
            dst="${MOODLE_DIR}/${relpath}/"
            if [ ! -d "$src" ]; then
              echo "Skip missing source: $src" >&2
              continue
            fi
            if [ ! -f "${src}version.php" ]; then
              echo "Skip placeholder (no version.php): $srcname" >&2
              continue
            fi
            sudo /usr/bin/mkdir -p "$dst"
            sudo "${RSYNC_BIN}" -av --delete \
              --exclude='.git' --exclude='.github' --exclude='*.md' --exclude='tests/' \
              "$src" "$dst"
            chown_plugin "$relpath"
            echo "Synced $srcname -> $relpath"
          done

      - name: Apply core patches
        run: |
          set -euo pipefail
          if [ -x "${PLUGINS_REPO_DIR}/core-patches/apply-patches.sh" ]; then
            bash "${PLUGINS_REPO_DIR}/core-patches/apply-patches.sh"
          else
            echo "No core-patches/apply-patches.sh — skipping"
          fi

      - name: Purge Moodle caches
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/purge_caches.php

      - name: Run Moodle upgrade
        if: github.event_name != 'workflow_dispatch' || inputs.skip_upgrade != 'true'
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/upgrade.php \
            --non-interactive --allow-unstable

      - name: Flush Redis application cache
        run: |
          set -euo pipefail
          redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" \
            -a "$(sudo /usr/bin/cat /etc/moodle/redis_password)" \
            -n 0 FLUSHDB

      - name: Disable maintenance mode
        if: always()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Health check
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w '%{http_code}' -k https://localhost/ \
            -H 'Host: understandtech.app')
          echo "HTTP status: $code"
          if [ "$code" != "200" ] && [ "$code" != "303" ]; then
            echo "Unexpected health check status: $code" >&2
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Deployment summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- Plugins: ${{ needs.validate.outputs.changed_plugins }}"
            echo "- Skip upgrade: ${{ inputs.skip_upgrade || 'false' }}"
            echo "- Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify
    needs: [validate, deploy]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post deployment result
        run: |
          set -euo pipefail
          echo "Validate: ${{ needs.validate.result }}"
          echo "Deploy: ${{ needs.validate.outputs.has_plugin_changes == 'true' && needs.deploy.result || 'skipped' }}"
          # Uncomment when NOTIFY_WEBHOOK_URL secret is configured:
          # curl -sS -X POST -H 'Content-Type: application/json' \
          #   -d "{\"text\":\"Deploy ${{ needs.deploy.result }} — ${{ github.sha }}\"}" \
          #   "${{ secrets.NOTIFY_WEBHOOK_URL }}"

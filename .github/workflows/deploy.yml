# Staging-first plugin deployment — Phase 5.1 / 6 (docs/playbook.md)
# validate → deploy staging → Playwright E2E → deploy production

name: Deploy Moodle Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upgrade:
        description: Skip Moodle upgrade.php
        type: choice
        options: ['false', 'true']
        default: 'false'
      skip_staging_gate:
        description: Emergency promote to prod without staging E2E (manual dispatch only)
        type: boolean
        default: false

concurrency:
  group: moodle-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  MOODLE_DIR: /var/www/moodle
  MOODLE_DATAROOT: /var/www/moodledata
  PLUGINS_REPO_DIR: /opt/understandtech-plugins
  PHP_BIN: /usr/bin/php
  RSYNC_BIN: /usr/bin/rsync
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      changed_plugins: ${{ steps.detect.outputs.changed_plugins }}
      has_plugin_changes: ${{ steps.detect.outputs.has_plugin_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, intl, zip
          coverage: none

      - name: PHP syntax lint
        run: |
          set -euo pipefail
          mapfile -t files < <(find moodle-plugins -name '*.php' \
            ! -path '*/vendor/*' ! -path '*/.git/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PHP files under moodle-plugins/"
            exit 0
          fi
          for f in "${files[@]}"; do
            php -l "$f"
          done

      - name: Validate plugin version.php
        run: |
          set -euo pipefail
          while IFS= read -r -d '' versionfile; do
            php -r '
              $f = $argv[1];
              include $f;
              if (empty($plugin->version)) {
                  fwrite(STDERR, "Missing \$plugin->version in {$f}\n");
                  exit(1);
              }
              if (empty($plugin->component)) {
                  fwrite(STDERR, "Missing \$plugin->component in {$f}\n");
                  exit(1);
              }
              echo "OK {$plugin->component} v{$plugin->version}\n";
            ' "$versionfile"
          done < <(find moodle-plugins -name version.php -print0)

      - name: Validate Moodle 4.5 plugin API compatibility
        run: |
          set -euo pipefail
          php scripts/validate-moodle-plugin-api.php

      - name: Moodle CodeChecker (warn only)
        continue-on-error: true
        run: |
          set -euo pipefail
          composer global require --no-interaction moodlehq/moodle-cs
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          phpcs --standard=moodle moodle-plugins/ || true

      - name: Validate Bicep
        run: |
          set -euo pipefail
          az config set bicep.use_binary_from_path=false
          az bicep build --file infrastructure/bicep/main.bicep

      - name: AI Gateway typecheck
        run: |
          set -euo pipefail
          cd cloudflare-worker/ai-gateway
          npm ci
          npm run typecheck

      - name: Detect changed plugins
        id: detect
        run: |
          set -euo pipefail

          # Only deploy plugins with version.php; README-only placeholders are skipped.
          is_deployable() {
            [ -f "moodle-plugins/$1/version.php" ]
          }

          detect_all() {
            find moodle-plugins -mindepth 1 -maxdepth 1 -type d -printf '%f\n' \
              | while read -r name; do
                  is_deployable "$name" && echo "$name"
                done | sort
          }

          filter_deployable() {
            while read -r name; do
              [ -n "$name" ] && is_deployable "$name" && echo "$name"
            done | sort -u
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mapfile -t plugins < <(detect_all)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            mapfile -t plugins < <(
              git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD \
                | grep '^moodle-plugins/' | cut -d/ -f2 | filter_deployable
            )
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            mapfile -t plugins < <(
              git diff --name-only HEAD~1 HEAD \
                | grep '^moodle-plugins/' | cut -d/ -f2 | filter_deployable || true
            )
            if git diff --name-only HEAD~1 HEAD | grep -q '^core-patches/'; then
              if ! printf '%s\n' "${plugins[@]}" | grep -qx 'theme_understandtech'; then
                plugins+=('theme_understandtech')
              fi
            fi
          else
            mapfile -t plugins < <(detect_all)
          fi

          if [ "${#plugins[@]}" -eq 0 ]; then
            echo "changed_plugins="
            echo "has_plugin_changes=false"
            echo "No moodle-plugins changes detected"
            exit 0
          fi

          joined=$(printf '%s ' "${plugins[@]}")
          echo "changed_plugins=${joined}" >> "$GITHUB_OUTPUT"
          echo "has_plugin_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${joined}"

  deploy-staging:
    name: Deploy staging
    needs: validate
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.validate.outputs.has_plugin_changes == 'true') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_staging_gate == true)
    uses: ./.github/workflows/deploy-staging.yml
    with:
      changed_plugins: ${{ needs.validate.outputs.changed_plugins }}
      skip_upgrade: ${{ inputs.skip_upgrade || 'false' }}
      github_sha: ${{ github.sha }}
    secrets: inherit

  staging-e2e:
    name: Staging E2E
    needs: [validate, deploy-staging]
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.validate.outputs.has_plugin_changes == 'true') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_staging_gate == true)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          set -euo pipefail
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright (staging)
        working-directory: tests/e2e
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          STAGING_TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          MOODLE_E2E_USER: ${{ secrets.MOODLE_E2E_USER }}
          MOODLE_E2E_PASS: ${{ secrets.MOODLE_E2E_PASS }}
          E2E_COURSE_PATH: ${{ secrets.E2E_COURSE_PATH }}
          CI: 'true'
        run: |
          set -euo pipefail
          export STAGING_URL="${STAGING_URL:-https://staging.understandtech.app/learn}"
          # Staging VM user from setup-e2e-test-user-vm.sh (post-deploy-stabilize); secrets override when set.
          export STAGING_TEST_USER_EMAIL="${STAGING_TEST_USER_EMAIL:-${MOODLE_E2E_USER:-e2etest}}"
          export STAGING_TEST_USER_PASSWORD="${STAGING_TEST_USER_PASSWORD:-${MOODLE_E2E_PASS:-UtE2eTest2026Secure}}"
          export E2E_COURSE_PATH="${E2E_COURSE_PATH:-/course/view.php?id=2}"
          # Deploy gate: setup login + navigation (skip auth.spec — duplicates setup and hits /login rate limit).
          npx playwright test --project=setup --project=chromium --workers=1 \
            auth.setup.ts course-navigation.spec.ts exam-readiness.spec.ts frontpage.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy production
    needs: [validate, deploy-staging, staging-e2e]
    if: |
      always() &&
      !cancelled() &&
      needs.validate.result == 'success' &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.validate.outputs.has_plugin_changes == 'true') &&
      (needs.staging-e2e.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.skip_staging_gate == true))
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record pre-deploy SHA for rollback
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          git rev-parse HEAD | sudo tee /tmp/understandtech-pre-deploy-sha >/dev/null
          echo "pre_deploy_sha=$(cat /tmp/understandtech-pre-deploy-sha)"

      - name: Enable maintenance mode
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --enable

      - name: Sync monorepo on VM
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /opt/understandtech-plugins
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
          actual="$(git rev-parse HEAD)"
          # Accept if VM is at the expected SHA or any newer commit that contains it
          if git merge-base --is-ancestor "${EXPECTED_SHA}" "${actual}" 2>/dev/null || [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "Monorepo synced: VM is at ${actual} (expected ${EXPECTED_SHA} or newer)"
          else
            echo "WARNING: VM is at ${actual}, expected ${EXPECTED_SHA} — proceeding anyway"
          fi

      - name: Remove undeployed plugin placeholders on VM
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /opt/understandtech-plugins/scripts/remove-placeholder-plugins.sh

      - name: Rsync changed plugins
        env:
          CHANGED_PLUGINS: ${{ needs.validate.outputs.changed_plugins }}
        run: |
          set -euo pipefail

          plugin_moodle_path() {
            local name="$1"
            case "$name" in
              local_*) echo "local/${name#local_}" ;;
              mod_*) echo "mod/${name#mod_}" ;;
              theme_*) echo "theme/${name#theme_}" ;;
              block_*) echo "blocks/${name#block_}" ;;
              qbehaviour_*) echo "question/behaviour/${name#qbehaviour_}" ;;
              *)
                echo "Unknown plugin prefix: $name" >&2
                return 1
                ;;
            esac
          }

          chown_plugin() {
            local relpath="$1"
            case "$relpath" in
              local/*|mod/*|theme/*|blocks/*)
                local type="${relpath%%/*}"
                local name="${relpath#*/}"
                sudo /usr/bin/chown -R www-data:www-data "${MOODLE_DIR}/${type}/${name}"
                ;;
              question/behaviour/*)
                local name="${relpath#question/behaviour/}"
                sudo /usr/bin/chown -R www-data:www-data "${MOODLE_DIR}/question/behaviour/${name}"
                ;;
              *)
                echo "No sudo chown rule for path: $relpath" >&2
                return 1
                ;;
            esac
          }

          read -r -a plugins <<< "$CHANGED_PLUGINS"
          for srcname in "${plugins[@]}"; do
            [ -z "$srcname" ] && continue
            relpath="$(plugin_moodle_path "$srcname")"
            src="${PLUGINS_REPO_DIR}/moodle-plugins/${srcname}/"
            dst="${MOODLE_DIR}/${relpath}/"
            if [ ! -d "$src" ]; then
              echo "Skip missing source: $src" >&2
              continue
            fi
            if [ ! -f "${src}version.php" ]; then
              echo "Skip placeholder (no version.php): $srcname" >&2
              continue
            fi
            sudo /usr/bin/mkdir -p "$dst"
            sudo "${RSYNC_BIN}" -av --delete \
              --exclude='.git' --exclude='.github' --exclude='*.md' --exclude='tests/' \
              "$src" "$dst"
            chown_plugin "$relpath"
            echo "Synced $srcname -> $relpath"
          done

      - name: Apply core patches
        run: |
          set -euo pipefail
          if [ -f "${PLUGINS_REPO_DIR}/core-patches/apply-patches.sh" ]; then
            sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/core-patches/apply-patches.sh"
          else
            echo "No core-patches/apply-patches.sh — skipping"
          fi

      - name: Ensure Redis Moodle sessions
        continue-on-error: true
        run: |
          set -euo pipefail
          bash "${PLUGINS_REPO_DIR}/scripts/migrate-moodle-sessions-to-redis-vm.sh"

      - name: Restart PHP-FPM
        run: |
          set -euo pipefail
          # Full restart (not reload) — reload leaves stale workers that can fail
          # web DB bootstrap with "Error reading from database" after plugin sync.
          sudo /usr/bin/systemctl restart php8.3-fpm

      - name: Run Moodle upgrade
        if: github.event_name != 'workflow_dispatch' || inputs.skip_upgrade != 'true'
        run: |
          set -euo pipefail
          UPGRADE_LOG="${RUNNER_TEMP}/moodle-upgrade.log"
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/moodle-upgrade-direct-pg.sh" 2>&1 | tee "$UPGRADE_LOG"
          code=${PIPESTATUS[0]}
          echo "upgrade exit code: ${code}"
          if [ "${code}" -ne 0 ]; then
            echo "=== upgrade log ===" >&2
            sudo /usr/bin/cat "$UPGRADE_LOG" >&2 || true
            exit "${code}"
          fi

      - name: Fix Moodle directory permissions
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/fix-moodle-dir-permissions-vm.sh"

      - name: Verify www-data chdir and recycle PHP-FPM
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/fix-moodle-chdir-quick-vm.sh"

      - name: Flush Redis application cache
        continue-on-error: true
        run: |
          set -euo pipefail
          redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" \
            -a "$(sudo /usr/bin/cat /etc/moodle/redis_password)" \
            -n 0 FLUSHDB

      - name: Health check
        run: |
          set -euo pipefail
          # Origin :443 enforces Cloudflare Authenticated Origin Pulls (ssl_verify_client on).
          # Local HTTPS curl without a CF client cert returns 400 — verify stack on-box instead.
          for svc in nginx php8.3-fpm pgbouncer; do
            if ! systemctl is-active --quiet "$svc"; then
              echo "Service not active: $svc" >&2
              systemctl status "$svc" --no-pager >&2 || true
              exit 1
            fi
            echo "$svc: active"
          done

          if [ ! -S /run/php/moodle.sock ]; then
            echo "PHP-FPM socket missing: /run/php/moodle.sock" >&2
            exit 1
          fi
          echo "php-fpm socket: ok"

      - name: Post-deploy stabilize (enrol, theme, permissions)
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/post-deploy-stabilize-vm.sh"

      - name: Verify Moodle web health (strict)
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/verify-moodle-web-health.sh"

      - name: Post-deploy smoke test
        env:
          ON_VM: '1'
          PROD_URL: https://understandtech.app
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash "${PLUGINS_REPO_DIR}/scripts/smoke-test-deployment.sh"

      - name: Disable maintenance mode
        if: success()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Rollback failed deploy
        if: failure()
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/rollback-deploy-vm.sh" || true
          if ! sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/ensure-origin-healthy-vm.sh"; then
            echo "Origin still unhealthy after rollback — maintenance left ON" >&2
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Deployment summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- Plugins: ${{ needs.validate.outputs.changed_plugins }}"
            echo "- Skip upgrade: ${{ inputs.skip_upgrade || 'false' }}"
            echo "- Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify
    needs: [validate, deploy-staging, staging-e2e, deploy]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post deployment result
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          echo "Validate: ${{ needs.validate.result }}"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "E2E: ${{ needs.staging-e2e.result }}"
          echo "Production: ${{ needs.validate.outputs.has_plugin_changes == 'true' && needs.deploy.result || 'skipped' }}"
          if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
            payload=$(printf '{"text":"Deploy prod %s — staging %s / e2e %s — %s (%s)"}' \
              "${{ needs.deploy.result }}" "${{ needs.deploy-staging.result }}" \
              "${{ needs.staging-e2e.result }}" "${{ github.sha }}" "${{ github.repository }}")
            curl -sS -X POST -H 'Content-Type: application/json' -d "$payload" "$NOTIFY_WEBHOOK_URL" || true
          fi

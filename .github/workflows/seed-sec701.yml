name: Seed SEC701 course

on:
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: Skip duplicate page/question cleanup before seeding
        type: boolean
        default: false

env:
  PLUGINS_REPO_DIR: /opt/understandtech-plugins

jobs:
  seed:
    runs-on: [self-hosted, linux, production]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync monorepo on VM
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd "$PLUGINS_REPO_DIR"
          sudo -u gha-runner git fetch origin main
          sudo -u gha-runner git reset --hard origin/main
          actual="$(git rev-parse HEAD)"
          if git merge-base --is-ancestor "${EXPECTED_SHA}" "${actual}" 2>/dev/null || [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "Monorepo synced: VM is at ${actual} (expected ${EXPECTED_SHA} or newer)"
          else
            echo "WARNING: VM is at ${actual}, expected ${EXPECTED_SHA} — proceeding anyway"
          fi

      - name: Cleanup duplicate SEC701 content
        if: ${{ !inputs.skip_cleanup }}
        run: |
          set -euo pipefail
          sudo -u www-data php "${PLUGINS_REPO_DIR}/scripts/cleanup-sec701-duplicate-pages.php"
          sudo -u www-data php "${PLUGINS_REPO_DIR}/scripts/cleanup-sec701-duplicate-questions.php"

      - name: Seed SEC701 course
        id: seed
        run: |
          set -euo pipefail
          sudo -u www-data php "${PLUGINS_REPO_DIR}/scripts/seed-security-plus-course.php"
          sudo -u www-data php "${PLUGINS_REPO_DIR}/scripts/fix-sec701-course-filters.php"
          sudo -u www-data php /var/www/moodle/admin/cli/purge_caches.php
          echo 'seed_security_plus_complete=1'

      - name: Fix Moodle directory permissions
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo /usr/bin/bash "${PLUGINS_REPO_DIR}/scripts/fix-moodle-dir-permissions-vm.sh"

      - name: Disable maintenance mode
        if: always()
        run: |
          set -euo pipefail
          sudo /usr/bin/php /var/www/moodle/admin/cli/maintenance.php --disable

      - name: Seed summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## SEC701 seed summary"
            echo "- Result: ${{ job.status }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Skip cleanup: ${{ inputs.skip_cleanup }}"
            echo "- Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
